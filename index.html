<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <header class="banner">
        <img src="" alt="" class="imagen">
        <h1>Portal de Registro</h1>

    </header>

    <main class="principal">
        <article class="formulario">
            <h2>Datos del Usuario</h2>
            <form id="registroForm">
                
                <p>
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" required>
                </p>

                <p>
                    <label for="apellido">Apellido:</label>
                    <input type="text" id="apellido" name="apellido" required>
                </p>

                <p>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </p>

                <p>
                    <label for="edad">Edad:</label>
                    <input type="number" id="edad" name="edad" required>
                </p>

                <p>
                    <label for="pais">País:</label>
                    <select id="pais" name="pais" required>
                        <option value="">Selecciona...</option>
                        <option value="cl">Chile</option>
                    </select>
                </p>

                <fieldset>
                    <legend>Género</legend>
                    <label><input type="radio" name="gen" value="m" required> Masculino</label>
                    <label><input type="radio" name="gen" value="f"> Femenino</label>
                </fieldset>

                <p class="check-area">
                    <input type="checkbox" id="acepto" required>
                    <label for="acepto">Acepto términos</label>
                </p>

                <button type="submit" class="enviar">Enviar</button>
            </form>
        </article>

       <aside class="Ayuda">
            <h3>Ayuda</h3>
            <p>Asegúrate de que todos los campos marcados sean correctos.</p>
            <p><strong>Soporte:</strong> 24/7</p>
        </aside>
    </main>

    <script src="assets/js/script.js"></script>
</body>
</html>
